services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: todo-backend
    ports:
      - "3005:3005"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/todo.db
      - PORT=3005
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: todo-frontend
    ports:
      - "3004:80"
    depends_on:
      - backend
    restart: unless-stopped
