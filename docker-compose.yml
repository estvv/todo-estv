services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: todo-backend
    ports:
      - "${BACKEND_PORT:-3005}:${BACKEND_PORT:-3005}"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/todo.db
      - PORT=${BACKEND_PORT:-3005}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: todo-frontend
    ports:
      - "${FRONTEND_PORT:-3004}:80"
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.25'
